services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing} -d ${POSTGRES_DB:-ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: ./api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ticketing}:${POSTGRES_PASSWORD:-ticketing}@db:5432/${POSTGRES_DB:-ticketing}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-no-reply@ticketing.local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      PORT: "3000"
    ports:
      - "3000:3000"

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "8080:80"

  # Development SMTP capture. In production, point SMTP_HOST at relay1.dataart.com instead.
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  db-data:
